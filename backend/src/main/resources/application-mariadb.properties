# ============================================================================
# MariaDB Database - Staging / Production Profile
# ============================================================================

# Database Connection Details
spring.datasource.url=jdbc:mariadb://localhost:3306/vendorbridge?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Database Platform Dialect
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=VendorBridgeHikariCP
