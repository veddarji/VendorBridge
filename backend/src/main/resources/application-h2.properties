# ============================================================================
# H2 In-Memory Database - Local Development Profile
# ============================================================================

# Datasource configuration with MariaDB compatibility mode
spring.datasource.url=jdbc:h2:mem:vendorbridgedb;DB_CLOSE_DELAY=-1;MODE=MariaDB;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 Web Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Hibernate Dialect override for H2 compatibility in MariaDB mode
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
