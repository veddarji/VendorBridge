# ============================================================================
# VendorBridge ERP - MariaDB Direct Configuration
# ============================================================================
spring.application.name=backend

# Database Connection Details (MariaDB)
spring.datasource.url=jdbc:mariadb://localhost:3306/vendorbridge?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=kunjpandya
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Port configuration
server.port=8081

# JPA / Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Schema Migration Configurations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
